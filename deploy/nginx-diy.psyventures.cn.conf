server {
    server_name diy.psyventures.cn;

    root /var/www/diy.psyventures.cn;
    index index.html;

    client_max_body_size 50M;

    # 静态前端
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API (FastAPI on 127.0.0.1:8225)
    location /api/ {
        proxy_pass http://127.0.0.1:8225;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /set_username/ {
        proxy_pass http://127.0.0.1:8225;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 显式用户名空间：交由后端校验用户/公开场景是否存在（不存在返回404）
    location /u/ {
        proxy_pass http://127.0.0.1:8225;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8225;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 对话
    location /ws/ {
        proxy_pass http://127.0.0.1:8225;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/diy.psyventures.cn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/diy.psyventures.cn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = diy.psyventures.cn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name diy.psyventures.cn;
    return 404; # managed by Certbot


}